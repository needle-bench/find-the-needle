<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>
  <!-- Community -->
  <rect x="20" y="20" width="130" height="60" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="85" y="46" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="11" font-weight="600">community</text>
  <text x="85" y="64" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">submit PR</text>
  <!-- Arrow down -->
  <line x1="85" y1="84" x2="85" y2="108" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- CI validates -->
  <rect x="20" y="112" width="130" height="60" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="85" y="138" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="11" font-weight="600">CI</text>
  <text x="85" y="156" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">validate + build</text>
  <!-- Arrow right from CI -->
  <line x1="154" y1="142" x2="208" y2="142" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- Benchmarks repo -->
  <rect x="212" y="112" width="150" height="60" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="287" y="136" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="11" font-weight="600">benchmarks/</text>
  <text x="287" y="154" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">Dockerfile + test.sh</text>
  <!-- Arrow right to agent runner -->
  <line x1="366" y1="142" x2="420" y2="142" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- Agent runner -->
  <rect x="424" y="20" width="150" height="60" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="499" y="44" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="11" font-weight="600">agent runner</text>
  <text x="499" y="62" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">docker + harness</text>
  <!-- Vertical connector -->
  <line x1="424" y1="138" x2="424" y2="84" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- Arrow down from runner to scorer -->
  <line x1="499" y1="84" x2="499" y2="108" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- Scorer -->
  <rect x="424" y="112" width="150" height="60" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="499" y="136" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="11" font-weight="600">scorer</text>
  <text x="499" y="154" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">11 metrics</text>
  <!-- Arrow down from scorer to leaderboard -->
  <line x1="499" y1="176" x2="499" y2="198" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- Leaderboard -->
  <rect x="424" y="202" width="150" height="30" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="499" y="222" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="11" font-weight="600">scores.json</text>
  <!-- Arrow from leaderboard left to site -->
  <line x1="420" y1="217" x2="366" y2="217" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- Site -->
  <rect x="212" y="202" width="150" height="30" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="287" y="222" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="11" font-weight="600">needle-bench.cc</text>
</svg>
