<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .label { fill: #8b949e; font-family: monospace; font-size: 10px; }
      .label-highlight { fill: #e6edf3; font-family: monospace; font-size: 10px; font-weight: 600; }
      .ring { fill: none; stroke: #30363d; stroke-width: 0.5; }
      .spoke { stroke: #30363d; stroke-width: 0.5; }
      .data { fill: rgba(88, 166, 255, 0.15); stroke: #58a6ff; stroke-width: 1.5; }
      .dot { fill: #58a6ff; }
    </style>
  </defs>
  <!-- Center at 200,200, radius 130 -->
  <circle cx="200" cy="200" r="130" class="ring"/>
  <circle cx="200" cy="200" r="97.5" class="ring"/>
  <circle cx="200" cy="200" r="65" class="ring"/>
  <circle cx="200" cy="200" r="32.5" class="ring"/>
  <!-- 11 spokes -->
  <line x1="200" y1="200" x2="200" y2="70" class="spoke"/>
  <line x1="200" y1="200" x2="270" y2="89" class="spoke"/>
  <line x1="200" y1="200" x2="316" y2="145" class="spoke"/>
  <line x1="200" y1="200" x2="328" y2="218" class="spoke"/>
  <line x1="200" y1="200" x2="300" y2="290" class="spoke"/>
  <line x1="200" y1="200" x2="240" y2="328" class="spoke"/>
  <line x1="200" y1="200" x2="160" y2="328" class="spoke"/>
  <line x1="200" y1="200" x2="100" y2="290" class="spoke"/>
  <line x1="200" y1="200" x2="72" y2="218" class="spoke"/>
  <line x1="200" y1="200" x2="84" y2="145" class="spoke"/>
  <line x1="200" y1="200" x2="130" y2="89" class="spoke"/>
  <!-- Sample data polygon -->
  <polygon points="200,83 258,99 299,159 308,214 280,274 236,314 168,314 116,274 85,214 97,159 140,99" class="data"/>
  <!-- Dots at vertices -->
  <circle cx="200" cy="83" r="3" class="dot"/>
  <circle cx="258" cy="99" r="3" class="dot"/>
  <circle cx="299" cy="159" r="3" class="dot"/>
  <circle cx="308" cy="214" r="3" class="dot"/>
  <circle cx="280" cy="274" r="3" class="dot"/>
  <circle cx="236" cy="314" r="3" class="dot"/>
  <circle cx="168" cy="314" r="3" class="dot"/>
  <circle cx="116" cy="274" r="3" class="dot"/>
  <circle cx="85" cy="214" r="3" class="dot"/>
  <circle cx="97" cy="159" r="3" class="dot"/>
  <circle cx="140" cy="99" r="3" class="dot"/>
  <!-- Labels -->
  <text x="200" y="58" text-anchor="middle" class="label-highlight">resolved</text>
  <text x="282" y="84" text-anchor="start" class="label">discovery</text>
  <text x="324" y="149" text-anchor="start" class="label">fix turns</text>
  <text x="336" y="222" text-anchor="start" class="label">signal:noise</text>
  <text x="306" y="298" text-anchor="start" class="label">false pos</text>
  <text x="240" y="348" text-anchor="start" class="label">token cost</text>
  <text x="108" y="348" text-anchor="end" class="label">tok/line</text>
  <text x="88" y="298" text-anchor="end" class="label">recovery</text>
  <text x="60" y="222" text-anchor="end" class="label">recov rate</text>
  <text x="72" y="149" text-anchor="end" class="label">wall clock</text>
  <text x="118" y="84" text-anchor="end" class="label">blind</text>
</svg>
