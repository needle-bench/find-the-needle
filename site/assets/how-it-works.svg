<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>
  <!-- Step 1: Dockerfile -->
  <rect x="10" y="40" width="100" height="80" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="60" y="72" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="11" font-weight="600">Dockerfile</text>
  <text x="60" y="92" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">real bug</text>
  <text x="60" y="106" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">baked in</text>
  <!-- Arrow 1 -->
  <line x1="114" y1="80" x2="148" y2="80" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Step 2: Docker build -->
  <rect x="152" y="40" width="100" height="80" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="202" y="72" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="11" font-weight="600">docker</text>
  <text x="202" y="88" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="11" font-weight="600">build</text>
  <text x="202" y="106" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">&lt;5 min</text>
  <!-- Arrow 2 -->
  <line x1="256" y1="80" x2="290" y2="80" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Step 3: Agent dropped in -->
  <rect x="294" y="40" width="100" height="80" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="344" y="68" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="11" font-weight="600">agent</text>
  <text x="344" y="84" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="10">"find the</text>
  <text x="344" y="98" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="10">needle"</text>
  <text x="344" y="114" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">explores, patches</text>
  <!-- Arrow 3 -->
  <line x1="398" y1="80" x2="432" y2="80" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Step 4: test.sh -->
  <rect x="436" y="40" width="100" height="80" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="486" y="72" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="11" font-weight="600">test.sh</text>
  <text x="486" y="92" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">exit 0 = pass</text>
  <text x="486" y="106" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">exit 1 = fail</text>
  <!-- Arrow 4 -->
  <line x1="540" y1="80" x2="574" y2="80" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Step 5: Score -->
  <rect x="578" y="40" width="130" height="80" rx="4" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="643" y="68" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="11" font-weight="600">score</text>
  <text x="643" y="86" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">11 metrics</text>
  <text x="643" y="100" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">deterministic</text>
  <text x="643" y="114" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">leaderboard</text>
  <!-- Labels at top -->
  <text x="60" y="28" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">1</text>
  <text x="202" y="28" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">2</text>
  <text x="344" y="28" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">3</text>
  <text x="486" y="28" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">4</text>
  <text x="643" y="28" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">5</text>
</svg>
